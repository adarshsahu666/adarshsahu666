<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg {
      fill: #0f172a;
    }
    @keyframes move-grid {
      from { transform: translate(0, 0); }
      to { transform: translate(-30px, -30px); }
    }
    .grid {
      animation: move-grid 3s linear infinite;
    }
    @keyframes text-glow {
      0%, 100% { opacity: 0.8; filter: drop-shadow(0 0 2px #38bdf8); }
      50% { opacity: 1; filter: drop-shadow(0 0 10px #38bdf8); }
    }
    .name {
      font-family: 'Segoe UI', Roboto, sans-serif;
      font-weight: 800;
      font-size: 54px;
      fill: url(#name-gradient);
      animation: text-glow 3s ease-in-out infinite;
    }
    @keyframes typing {
      0% { clip-path: inset(0 100% 0 0); }
      100% { clip-path: inset(0 0 0 0); }
    }
    .role {
      font-family: 'Segoe UI', Roboto, sans-serif;
      font-weight: 300;
      font-size: 22px;
      fill: #94a3b8;
      letter-spacing: 4px;
      text-transform: uppercase;
      clip-path: inset(0 100% 0 0);
      animation: typing 4s steps(40) forwards;
    }
  </style>
  <defs>
    <linearGradient id="name-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <pattern id="grid-pattern" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(56, 189, 248, 0.2)" />
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" class="bg" rx="10" />
  <g class="grid">
    <rect width="200%" height="200%" fill="url(#grid-pattern)" />
  </g>
  
  <text x="50%" y="100" text-anchor="middle" class="name">ADARSH SAHU</text>
  <text x="50%" y="145" text-anchor="middle" class="role">Backend Engineer &amp; AI Integrator</text>
</svg>
